# Global git-hooks config — sourced by ~/.config/git/hooks/lib/common.sh.
# This file sets GLOBAL defaults (all repos). Override PER-REPO with:
#     git config hooks.<key> <value>
# git-config always wins over the values here.
#
# These are shell assignments; only the four tunables below are read from this
# file. Everything else is a git-config key (see the table in the README).

# Branch name patterns treated as "protected" (space-separated, globs allowed).
HOOKS_PROTECTED_BRANCHES="main master develop release/* hotfix/*"

# Ticket key required in commit subjects (ERE). Matches e.g. ROG-22827, ABC-1.
HOOKS_TICKET_PATTERN="[A-Z][A-Z0-9]+-[0-9]+"

# Max commit subject length.
HOOKS_SUBJECT_MAX_LEN=72

# Max staged file size before pre-commit blocks it (MiB).
HOOKS_MAX_FILE_SIZE_MB=5

# ---------------------------------------------------------------------------
# Quick reference — per-repo git-config toggles (defaults in []):
#
#   hooks.disable                 [false]  turn ALL hooks off
#   hooks.blockCommitOnProtected  [true]   block direct commits to protected
#   hooks.allowProtected          [false]  allow commits on protected (this repo)
#   hooks.blockPushToProtected    [false]  block ANY push to protected
#   hooks.allowProtectedForce     [false]  allow force/non-ff push to protected
#   hooks.secretScan              [true]   gitleaks / regex secret scan
#   hooks.checkLargeFiles         [true]   block oversized staged files
#   hooks.maxFileSizeMB           [5]
#   hooks.formatCheck             [true]   format check in pre-commit
#   hooks.lintOnCommit            [false]  also run linters in pre-commit
#   hooks.runTestsOnPush          [true]   lint + fast tests in pre-push
#   hooks.ticketRequired          [true]   require ticket key in subject
#   hooks.ticketPattern           [see above]
#   hooks.ticketScope             [subject] subject | message
#   hooks.conventional            [false]  enforce Conventional Commits
#   hooks.subjectMaxLen           [72]
#   hooks.rebaseProtectPublished  [true]   block rebase of published branches
#   hooks.allowRebasePublished    [false]
#   hooks.depsReminder            [true]   remind on manifest changes
#   hooks.autoInstallDeps         [false]  auto-run installers instead of remind
#
# Per-invocation env bypasses:
#   HOOKS_DISABLE=1            skip all hooks
#   HOOKS_ALLOW_PROTECTED=1    allow this protected commit/push
#   HOOKS_ALLOW_REBASE=1       allow this rebase
#   HOOKS_SKIP_TESTS=1         skip pre-push tests
#   git commit/push --no-verify   native git bypass
# ---------------------------------------------------------------------------
