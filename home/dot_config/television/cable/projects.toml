# Custom television channel — managed by chezmoi.
# Pick a git project (under ~/projects) and act on it:
# `tv projects` (or the `proj` nushell helper, which cd's into the pick).
# Modeled on the bundled `git-repos.toml` but scoped to the dev root with a
# README/tree preview. No `enter` action → Enter prints the path so `proj` can
# cd; Ctrl-E opens it in the editor; Ctrl-S jumps into that repo's symbols.
# ~/projects is also the per-entity git-identity root (see git-identities-sync).
[metadata]
name = "projects"
requirements = ["fd", "git"]
description = "Pick a git project under ~/projects; preview README/tree; cd, edit, or jump to symbols."

[source]
command = "[ -d ~/projects ] && fd -g .git -HL -t d -d 5 --prune ~/projects --exec dirname '{}'"
display = "{split:/:-1}"

[preview]
command = "cd '{}'; if [ -f README.md ]; then bat -n --color=always README.md; else eza --tree --level=2 --color=always; fi"

[keybindings]
ctrl-e = "actions:edit"
ctrl-s = "actions:symbols"

[actions.edit]
description = "Open project in editor"
command = "${EDITOR:-vim} {}"
shell = "bash"
mode = "execute"

[actions.symbols]
description = "Fuzzy-search symbols in this project"
command = "tv symbols {}"
mode = "execute"
