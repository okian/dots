# lazygit — managed by chezmoi.
# Diffs render through delta, the SAME pager the git CLI uses, so a hunk looks
# identical in `git diff`, `git log` and lazygit (line numbers + side-by-side,
# inherited from git config's [delta]). The colour theme is layered on top from
# ~/.config/dots/lazygit.yml — generated by `dots theme` and wired via
# LG_CONFIG_FILE (env.nu / .zshrc) — so lazygit retints with everything else.
# Keep THIS file theme-agnostic.
gui:
  nerdFontsVersion: "3"   # matches the Nerd Fonts v3 installed by provisioning
  border: rounded         # same rounded frames as WezTerm / television
  showFileTree: true
  showRandomTip: false    # `dots tip` already covers this, in every shell
git:
  paging:
    colorArg: always
    pager: delta --dark --paging=never
  parseEmoji: true
os:
  editPreset: nvim        # $EDITOR is nvim everywhere; be explicit for o/e opens
